<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CoWorker</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.disconnected {
      background: #f87171;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .info {
      font-size: 12px;
      color: #888;
    }
    .version {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected</span>
  </div>
  <h3>CoWorker Browser Control</h3>
  <p class="info">Browser automation enabled via MCP</p>
  <p class="info" id="tabCount">Active tabs: -</p>
  <div class="version">Version 1.0.0</div>
  <script src="popup.js"></script>
</body>
</html>
