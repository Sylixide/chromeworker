<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CoWorker</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.disconnected {
      background: #f87171;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .info {
      font-size: 12px;
      color: #888;
    }
    .version {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }
    .update-banner {
      display: none;
      padding: 10px 12px;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .update-banner.visible {
      display: block;
    }
    .update-banner:hover {
      background: #264a73;
    }
    .update-text {
      font-size: 12px;
      color: #93c5fd;
      margin: 0;
    }
    .update-text strong {
      color: #60a5fa;
    }
    .update-link {
      font-size: 11px;
      color: #60a5fa;
      text-decoration: underline;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected</span>
  </div>
  <h3>CoWorker Browser Control</h3>
  <p class="info">Browser automation enabled via MCP</p>
  <p class="info" id="tabCount">Active tabs: -</p>
  <div class="update-banner" id="updateBanner" onclick="openDownloadUrl()">
    <p class="update-text"><strong>Update Available</strong> <span id="updateVersion"></span></p>
    <span class="update-link">Click to download new version</span>
  </div>
  <div class="version">Version <span id="currentVersion">1.0.1</span></div>
  <script src="popup.js"></script>
</body>
</html>
